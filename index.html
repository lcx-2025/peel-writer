<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEEL Writing Grader</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>PEEL Writing Grader</h1>
            <p>Structure your writing & get instant feedback</p>
            <!-- 深色模式切换按钮 -->
            <button id="theme-toggle" class="theme-toggle">
                <i class="fas fa-moon"></i> Switch Mode
            </button>
        </header>

        <div class="main-content">
            <!-- 左侧：正确包裹，无重复，无冲突 -->
            <div class="left-panel">
                <h2 class="panel-title">Writing Area</h2>

                <!-- 👇 这里重新加入 Essay Title 输入框 -->
                <div class="input-group">
                    <label for="title" class="input-label">Essay Title</label>
                    <input type="text" id="title" placeholder="Enter your essay title...">
                </div>

                <!-- 模板选择器 -->
                <div class="input-group">
                  <label class="input-label">Select Template</label>
                  <select id="template-select" class="template-select" onchange="loadTemplate()">
                    <option value="PEEL">PEEL (Point + Evidence + Explain + Link)</option>
                    <option value="PEEEL">PEEEL (Point + Example + Evidence + Explain + Link)</option>
                    <option value="PETAL">PETAL (Point + Example + Technique + Analysis + Link)</option>
                  </select>
                </div>

                <!-- 👇 把新加的按钮贴在这里 👇 -->
                <!-- 自定义区块控制 -->
                <div class="input-group" style="display: flex; gap: 10px;">
                  <button id="add-block" class="custom-btn">+ Add Section</button>
                  <button id="delete-selected" class="custom-btn delete-btn">- Delete Selected</button>
                </div>

                <div id="dynamic-blocks"></div>

                <!-- 总字数 -->
                <div class="total-word-count">
                    <i class="fas fa-file-alt"></i>
                    <span>Total Word Count: </span>
                    <span id="total-count">0</span>
                </div>

                <!-- 提交按钮放上面 -->
                <button class="submit-btn" onclick="submitPEEL()">Submit & Get Feedback</button>

                <!-- Full Text 复制框放下面 -->
                <div class="full-text-group">
                    <label class="input-label">Full Text (Copyable)</label>
                    <div class="full-text-container">
                        <textarea id="full-text" readonly placeholder="Your complete writing will appear here..." rows="4"></textarea>
                        <button id="copy-btn" onclick="copyFullText()">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                        <span id="copy-toast" class="copy-toast">Copied!</span>
                    </div>
                </div>
            </div>

            <!-- 右侧结果区（不动） -->
            <div class="right-panel">
                <h2 class="panel-title">Results & Analysis</h2>
                <div class="chart-wrapper"><canvas id="peelChart"></canvas></div>

                <div class="score-display">
                    <h3 class="card-title">Scoring Results</h3>
                    <div class="score-grid">
                        <div class="score-item"><span class="score-label">Point</span><span class="score-value" id="score-point">--/18</span></div>
                        <div class="score-item"><span class="score-label">Evidence</span><span class="score-value" id="score-evidence">--/22</span></div>
                        <div class="score-item"><span class="score-label">Explain</span><span class="score-value" id="score-explain">--/22</span></div>
                        <div class="score-item"><span class="score-label">Link</span><span class="score-value" id="score-link">--/18</span></div>
                        <div class="score-item"><span class="score-label">Grammar</span><span class="score-value" id="score-grammar">--/20</span></div>
                        <div class="score-item total-score"><span class="score-label">Total</span><span class="score-value" id="score-total">--/100</span></div>
                    </div>
                </div>

                <div class="suggestions" id="suggestions">
                    <h3 class="card-title">Improvement Suggestions</h3>
                    <p class="empty-state">Complete your writing and submit to get feedback</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
